# ============================================================
#  ACEest Fitness - Canary Release Strategy
#  Send 20% traffic to new version, 80% to stable
# ============================================================

# ── Stable Deployment (80% traffic - 4 replicas) ────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-stable
  labels:
    app: aceest-fitness
    track: stable
spec:
  replicas: 4
  selector:
    matchLabels:
      app: aceest-fitness
      track: stable
  template:
    metadata:
      labels:
        app: aceest-fitness
        track: stable
        version: v3.1.2
    spec:
      containers:
      - name: aceest-fitness
        image: sudhakaran97/aceest-fitness:v3.1.2
        ports:
        - containerPort: 5000
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"

---
# ── Canary Deployment (20% traffic - 1 replica) ─────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-canary
  labels:
    app: aceest-fitness
    track: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-fitness
      track: canary
  template:
    metadata:
      labels:
        app: aceest-fitness
        track: canary
        version: v3.2.4
    spec:
      containers:
      - name: aceest-fitness
        image: sudhakaran97/aceest-fitness:v3.2.4
        ports:
        - containerPort: 5000
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"

---
# ── Service (Routes to both stable and canary) ──────────────
# Selects ALL pods with app=aceest-fitness (both stable+canary)
# 4 stable + 1 canary = 80%/20% split automatically
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-canary-service
spec:
  selector:
    app: aceest-fitness
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
  type: NodePort
