# ============================================================
#  ACEest Fitness - A/B Testing Strategy
#  Route different users to different versions
#  Version A = v3.1.2, Version B = v3.2.4
# ============================================================

# ── Version A Deployment ─────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-version-a
  labels:
    app: aceest-fitness
    variant: a
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      variant: a
  template:
    metadata:
      labels:
        app: aceest-fitness
        variant: a
        version: v3.1.2
    spec:
      containers:
      - name: aceest-fitness
        image: sudhakaran97/aceest-fitness:v3.1.2
        ports:
        - containerPort: 5000
        env:
        - name: APP_VARIANT
          value: "A"
        - name: APP_VERSION
          value: "v3.1.2"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"

---
# ── Version B Deployment ─────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-version-b
  labels:
    app: aceest-fitness
    variant: b
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      variant: b
  template:
    metadata:
      labels:
        app: aceest-fitness
        variant: b
        version: v3.2.4
    spec:
      containers:
      - name: aceest-fitness
        image: sudhakaran97/aceest-fitness:v3.2.4
        ports:
        - containerPort: 5000
        env:
        - name: APP_VARIANT
          value: "B"
        - name: APP_VERSION
          value: "v3.2.4"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"

---
# ── Service A (routes to Version A) ─────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-service-a
spec:
  selector:
    app: aceest-fitness
    variant: a
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
  type: NodePort

---
# ── Service B (routes to Version B) ─────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-service-b
spec:
  selector:
    app: aceest-fitness
    variant: b
  ports:
  - protocol: TCP
    port: 81
    targetPort: 5000
  type: NodePort
